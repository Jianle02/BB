<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <style>
        body {
            background-color: #110005; /* Deep romantic dark red/black */
            color: #ffb3c6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            color: #ff0040;
            text-shadow: 0 0 10px rgba(255, 0, 64, 0.5);
            margin-bottom: 20px;
        }

        /* The 3D Scene */
        .scene {
            width: 320px;
            height: 420px;
            perspective: 1000px;
            margin-bottom: 30px;
        }

        /* The Flip Card */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 77, 109, 0.3);
            background: linear-gradient(145deg, rgba(255, 77, 109, 0.1), rgba(255, 0, 64, 0.05));
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Front Face Style */
        .card-front h2 {
            font-size: 22px;
            color: #ff8fa3;
        }

        .tap-hint {
            font-size: 12px;
            margin-top: 20px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Back Face Style */
        .card-back {
            transform: rotateY(180deg);
            background: rgba(20, 0, 5, 0.95);
        }

        .card-back img {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-back p {
            font-size: 16px;
            line-height: 1.4;
            color: #ffe5ec;
        }

        /* Navigation Buttons */
        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            background: transparent;
            color: #ff8fa3;
            border: 1px solid #ff8fa3;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:active {
            background: rgba(255, 77, 109, 0.2);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>For My Love</h1>

    <div class="scene">
        <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front" id="frontContent">
                </div>
            <div class="card-face card-back" id="backContent">
                </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="changeCard(-1)">❮ Prev</button>
        <button onclick="changeCard(1)">Next ❯</button>
    </div>

    <script>
        // --- 1. LIST YOUR MEMORIES HERE ---
        // 'img' must match your filename on GitHub (case-sensitive!)
        const memories = [
            { 
                title: "Memory #1", 
                hint: "The day we first met...", 
                text: "I still remember exactly what you were wearing. You looked beautiful.",
                img: "first_date.jpg" 
            },
            { 
                title: "Memory #2", 
                hint: "Our favorite dinner date", 
                text: "The food was great, but the company was even better.",
                img: "dinner.png" 
            },
            { 
                title: "Memory #3", 
                hint: "Happy Birthday!", 
                text: "I am so lucky to have you. Here's to many more memories together.",
                img: "birthday.jpg" 
            }
        ];

        let currentIdx = 0;

        function updateCard() {
            const card = document.getElementById('card');
            const front = document.getElementById('frontContent');
            const back = document.getElementById('backContent');

            // Flip card back to front before changing data
            card.classList.remove('is-flipped');

            setTimeout(() => {
                const m = memories[currentIdx];
                front.innerHTML = `<h2>${m.title}</h2><p>${m.hint}</p><div class="tap-hint">Tap to see memory</div>`;
                back.innerHTML = `
                    <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x240/110005/ff8fa3?text=Photo+Not+Found'">
                    <p>${m.text}</p>
                `;
            }, 300);
        }

        function changeCard(step) {
            currentIdx = (currentIdx + step + memories.length) % memories.length;
            updateCard();
        }

        // Initialize first card
        updateCard();
    </script>
</body>
</html>
